<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Puter API</title>
</head>
<body>
    <script src="https://js.puter.com/v2/"></script>
    <script>
        // Read the "q" parameter from the URL
        const params = new URLSearchParams(window.location.search);
        const userQuery = params.get("q") || "hello";

        // Send it to Puter AI
        puter.ai.chat(userQuery, { model: "gpt-5.4-nano" })
            .then(puter.print)
            .catch(console.error);
    </script>
</body>
</html>
