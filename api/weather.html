<!DOCTYPE html>
<meta charset="UTF-8">

<script>
(async () => {
    const params = new URLSearchParams(location.search);
    const query = params.get("q");

    // If no ?q= provided
    if (!query) {
        return output({ error: "Missing ?q= parameter" });
    }

    try {
        // 1. Geocode
        const geoURL =
            "https://geocoding-api.open-meteo.com/v1/search?name=" +
            encodeURIComponent(query) +
            "&count=1";

        const geo = await fetch(geoURL).then(r => r.json());

        if (!geo.results || geo.results.length === 0) {
            return output({ error: "Location not found", query });
        }

        const loc = geo.results[0];

        // 2. Weather
        const weatherURL =
            "https://api.open-meteo.com/v1/forecast?latitude=" + loc.latitude +
            "&longitude=" + loc.longitude +
            "&current=temperature_2m,relative_humidity_2m,uv_index,wind_speed_10m";

        const weather = await fetch(weatherURL).then(r => r.json());

        // 3. Build JSON
        const result = {
            query,
            resolved_location: {
                name: loc.name,
                country: loc.country,
                latitude: loc.latitude,
                longitude: loc.longitude
            },
            weather: {
                temperature: weather.current.temperature_2m,
                humidity: weather.current.relative_humidity_2m,
                uv_index: weather.current.uv_index,
                wind_speed: weather.current.wind_speed_10m,
                time: weather.current.time
            }
        };

        output(result);

    } catch (err) {
        output({ error: "Internal error", details: err.toString() });
    }
})();

// Output JSON ONLY
function output(obj) {
    const json = JSON.stringify(obj, null, 2);

    // Replace entire document with JSON text
    document.open("application/json");
    document.write(json);
    document.close();
}
</script>
