<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FoxURL — Products</title>
  <style>
    body { font-family: sans-serif; margin:0; padding:0; background:#f8f9fc; color:#222; }
    header { background:#ff7a00; color:white; padding:16px; }
    header h1 { margin:0; font-size:28px; }
    main { max-width:900px; margin:20px auto; padding:0 16px; }
    .product-list { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; }
    .product { background:white; border:1px solid #ddd; border-radius:12px; padding:16px; text-align:center; }
    .product img { max-width:100%; border-radius:8px; }
    .product h2 { margin:12px 0 6px; font-size:20px; }
    .product a { display:inline-block; margin-top:8px; color:#ff7a00; font-weight:bold; text-decoration:none; }
    .product a:hover { text-decoration:underline; }
    footer { text-align:center; margin:20px; font-size:13px; color:#666; }
  </style>
</head>
<body>
  <header>
    <h1>FoxURL Products</h1>
    <p>Innovate your connection 🦊</p>
  </header>

  <main>
    <h2>Our Products</h2>
    <div class="product-list">
      <!-- Product card example -->
      <div class="product">
        <img src="https://via.placeholder.com/200x120?text=Foxpad" alt="Foxpad" />
        <h2>Foxpad Apple</h2>
        <p>Our sleek Foxpad device, Apple edition.</p>
        <a href="products/Foxpad_apple.html">View Product →</a>
      </div>

      <div class="product">
        <img src="https://via.placeholder.com/200x120?text=FoxWatch" alt="FoxWatch" />
        <h2>FoxWatch</h2>
        <p>A smartwatch designed the Fox way.</p>
        <a href="products/Foxwatch.html">View Product →</a>
      </div>
    </div>
  </main>

  <footer>
    © 2025 FoxURL
  </footer>
</body>
</html>
