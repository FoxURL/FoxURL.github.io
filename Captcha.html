<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fox CAPTCHA Demo</title>

      min-height: 100vh;
      display: grid;

      padding: 24px;

</html>
