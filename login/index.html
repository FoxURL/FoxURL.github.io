<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxURL Login</title>

    <link rel="stylesheet" href="style.css">
    <script src="/main.js" defer></script>
    <script src="/encrypt.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body>

<div class="fox-animation">
    <div class="fox"></div>
</div>

<div class="card">

    <img src="/assets/logo/fox.png" class="logo">

    <h1 id="title">Sign in</h1>
    <p id="subtitle">to continue to FoxURL</p>

    <!-- STEP 1: EMAIL -->
    <form id="emailStep">
        <input type="email" id="email" placeholder="Email" required>
        <button type="submit">Next</button>
    </form>

    <!-- STEP 2: PASSWORD -->
    <form id="passwordStep" style="display:none;">
        <p class="email-display" id="emailDisplay"></p>
        <input type="password" id="password" placeholder="Enter your password" required>

        <div id="strength" class="strength"></div>

        <button type="submit">Login</button>
    </form>

    <p class="link">
        <a href="../register/">Create account</a>
    </p>
</div>

</body>
</html>
