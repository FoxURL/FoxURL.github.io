<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Internet Speed Test</title>

<style>
/* ——— YOUR THEME VARIABLES ——— */
:root {
    --bg: #190a02;
    --glass-bg: rgba(255,235,220,0.07);
    --glass-bg-strong: rgba(255,240,220,0.11);
    --glass-tint: rgba(255,140,60,0.06);
    --glass-border: rgba(255,200,140,0.14);
    --surface: rgba(255, 240, 210, 0.12);
    --surface-strong: rgba(255, 245, 220, 0.18);
    --text: #fff7ef;
    --muted: #ffe8c9;
    --primary: #ff7a18;
    --primary-strong: #ffd39a;
    --shadow: 0 18px 50px rgba(18, 8, 0, 0.38);
    --glass-blur: 12px;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    background: radial-gradient(circle at top left, rgba(255, 170, 85, 0.20), transparent 28%),
                radial-gradient(circle at bottom right, rgba(255, 125, 35, 0.12), transparent 30%),
                linear-gradient(180deg, #ff9b53 10%, #ff7a18 36%, #2b0f05 100%);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
}

/* ——— MAIN PANEL ——— */
.speed-panel {
    width: 100%;
    max-width: 880px;
    padding: 32px;
    border-radius: 26px;
    background: linear-gradient(180deg, var(--glass-bg), var(--glass-tint));
    border: 1px solid var(--glass-border);
    box-shadow: 0 18px 60px rgba(0,0,0,0.45), 0 0 40px rgba(255,120,30,0.06) inset;
    backdrop-filter: blur(var(--glass-blur));
    position: relative;
    transform-style: preserve-3d;
    perspective: 900px;
}

/* Layered glass planes */
.speed-panel::before,
.speed-panel::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
}

.speed-panel::before {
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.03);
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    transform-origin: center;
    transition: transform 0.6s ease, opacity 0.5s ease;
    z-index: 0;
}

.speed-panel::after {
    inset: 6px;
    background: radial-gradient(circle at 10% 10%, rgba(255,255,255,0.045), transparent 20%);
    filter: blur(2px);
    transform-origin: center;
    transition: transform 0.8s ease, opacity 0.5s ease;
    z-index: 1;
}

.speed-panel:hover {
    transform: translateY(-10px) rotateX(3deg);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
}

.speed-panel:hover::before {
    transform: translate3d(0,-10px,36px) scale(1.02);
    opacity: 0.95;
}

.speed-panel:hover::after {
    transform: translate3d(0,-22px,64px) scale(1.04);
    opacity: 0.9;
}

/* ——— HEADINGS ——— */
h1 {
    margin: 0 0 18px;
    font-size: 2.6rem;
    font-weight: 800;
}

p {
    margin: 0 0 22px;
    color: var(--muted);
    line-height: 1.7;
}

/* ——— INPUTS ——— */
label {
    font-size: 0.9rem;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
}

input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    font-size: 1rem;
    outline: none;
    backdrop-filter: blur(6px);
}

input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(255,120,30,0.25);
}

/* ——— BUTTONS ——— */
button {
    border: none;
    border-radius: 999px;
    padding: 14px 26px;
    background: linear-gradient(180deg, rgba(255,125,45,0.14), rgba(255,190,120,0.06));
    color: var(--text);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.42), inset 0 -6px 18px rgba(0,0,0,0.12);
    border: 1px solid rgba(255,190,120,0.08);
    transition: transform 0.22s ease, box-shadow 0.22s ease;
}

button:hover {
    transform: translateY(-3px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
}

button:disabled {
    opacity: 0.5;
    cursor: default;
}

/* ——— RESULTS ——— */
.result-box {
    margin-top: 26px;
    padding: 22px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.06);
    backdrop-filter: blur(8px);
}

.result-value {
    font-size: 2.4rem;
    font-weight: 800;
    margin-bottom: 6px;
}

.log {
    margin-top: 20px;
    max-height: 160px;
    overflow-y: auto;
    padding: 14px;
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--muted);
    font-size: 0.9rem;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="speed-panel">
    <h1>Internet Speed Test</h1>
    <p>Runs entirely in your browser. No server required.</p>

    <label>Test File URL</label>
    <input id="url" placeholder="https://example.com/100MB.bin">

    <label style="margin-top:14px;">File Size (MB)</label>
    <input id="size" type="number" value="100">

    <label style="margin-top:14px;">Runs</label>
    <input id="runs" type="number" value="3">

    <div style="margin-top:22px; display:flex; gap:14px;">
        <button id="start">Start Test</button>
        <button id="cancel" disabled>Cancel</button>
    </div>

    <div class="result-box">
        <div class="result-value" id="speed">0.00 Mbps</div>
        <div id="status">Idle</div>
    </div>

    <div class="log" id="log"></div>
</div>

<script>
function log(msg) {
    const box = document.getElementById("log");
    box.textContent += msg + "\n";
    box.scrollTop = box.scrollHeight;
}

function formatMbps(bps) {
    return (bps / 1_000_000).toFixed(2);
}

let aborter = null;

async function runTest() {
    const url = document.getElementById("url").value.trim();
    const sizeMB = parseFloat(document.getElementById("size").value);
    const runs = parseInt(document.getElementById("runs").value);

    if (!url) return alert("Enter a URL");

    document.getElementById("start").disabled = true;
    document.getElementById("cancel").disabled = false;
    document.getElementById("log").textContent = "";
    document.getElementById("status").textContent = "Running…";

    aborter = new AbortController();

    const expectedBytes = sizeMB * 1024 * 1024;
    const results = [];

    for (let i = 1; i <= runs; i++) {
        if (aborter.signal.aborted) break;

        log(`Run ${i}/${runs}…`);

        const t0 = performance.now();
        let bytes = 0;

        try {
            const resp = await fetch(url, { signal: aborter.signal, cache: "no-store" });
            const reader = resp.body.getReader();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                bytes += value.byteLength;
                if (bytes >= expectedBytes) break;
            }
        } catch (e) {
            log("Cancelled or failed.");
            break;
        }

        const t1 = performance.now();
        const seconds = (t1 - t0) / 1000;
        const bps = (bytes * 8) / seconds;

        results.push(bps);
        document.getElementById("speed").textContent = formatMbps(bps) + " Mbps";
        log(`Result: ${formatMbps(bps)} Mbps`);
    }

    if (results.length > 0) {
        const avg = results.reduce((a,b)=>a+b,0) / results.length;
        document.getElementById("speed").textContent = formatMbps(avg) + " Mbps";
        document.getElementById("status").textContent = "Complete";
    } else {
        document.getElementById("status").textContent = "Cancelled";
    }

    document.getElementById("start").disabled = false;
    document.getElementById("cancel").disabled = true;
}

document.getElementById("start").onclick = runTest;
document.getElementById("cancel").onclick = () => aborter?.abort();
</script>

</body>
</html>
