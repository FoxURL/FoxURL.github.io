<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Internet Speed Test</title>
<style>
:root {
    --bg: #190a02;
    --glass-bg: rgba(255,235,220,0.07);
    --glass-tint: rgba(255,140,60,0.06);
    --glass-border: rgba(255,200,140,0.14);
    --surface: rgba(255, 240, 210, 0.12);
    --text: #fff7ef;
    --muted: #ffe8c9;
    --primary: #ff7a18;
    --success: #4dffb5;
    --shadow: 0 18px 50px rgba(18, 8, 0, 0.38);
    --glass-blur: 12px;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    min-height: 100vh;
    font-family: Inter, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    background: radial-gradient(circle at top left, rgba(255, 170, 85, 0.20), transparent 28%),
                radial-gradient(circle at bottom right, rgba(255, 125, 35, 0.12), transparent 30%),
                linear-gradient(180deg, #ff9b53 10%, #ff7a18 36%, #2b0f05 100%);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

.panel {
    width: 100%;
    max-width: 720px;
    padding: 28px 26px 26px;
    border-radius: 26px;
    background: linear-gradient(180deg, var(--glass-bg), var(--glass-tint));
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow);
    backdrop-filter: blur(var(--glass-blur));
    position: relative;
    overflow: hidden;
}

.panel::before,
.panel::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
}

.panel::before {
    background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.03);
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    z-index: 0;
}

.panel::after {
    inset: 6px;
    background: radial-gradient(circle at 10% 10%, rgba(255,255,255,0.045), transparent 20%);
    filter: blur(2px);
    z-index: 1;
}

.panel-inner {
    position: relative;
    z-index: 2;
}

.header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
}

.header img {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    object-fit: cover;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.12);
}

.header-text h1 {
    margin: 0;
    font-size: 1.6rem;
    font-weight: 800;
}

.header-text p {
    margin: 4px 0 0;
    font-size: 0.9rem;
    color: var(--muted);
}

.main {
    margin-top: 10px;
    text-align: center;
}

.speed-label {
    font-size: 0.8rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
}

.speed-value {
    font-size: 3.2rem;
    font-weight: 800;
    transition: color 0.4s ease, opacity 0.25s ease;
    opacity: 1;
}

.speed-value.updating {
    opacity: 0.35;
}

.speed-unit {
    font-size: 0.9rem;
    color: var(--muted);
    margin-top: 2px;
}

.status {
    margin-top: 16px;
    font-size: 0.95rem;
    color: var(--muted);
}

.status-strong {
    display: block;
    font-size: 0.95rem;
    color: var(--text);
    margin-bottom: 4px;
}

.eta {
    margin-top: 6px;
    font-size: 0.85rem;
    color: var(--muted);
}

.summary {
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 18px;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 0.95rem;
    color: var(--muted);
    text-align: left;
}

.summary-title {
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--text);
}

.actions {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 12px;
}

button {
    border: none;
    border-radius: 999px;
    padding: 10px 22px;
    background: linear-gradient(180deg, rgba(255,125,45,0.18), rgba(255,190,120,0.08));
    color: var(--text);
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 10px 26px rgba(0,0,0,0.42), inset 0 -5px 14px rgba(0,0,0,0.12);
    border: 1px solid rgba(255,190,120,0.12);
    transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
}

button:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 18px 34px rgba(0,0,0,0.5);
}

button:disabled {
    opacity: 0.45;
    cursor: default;
    box-shadow: none;
}

.footer-note {
    margin-top: 14px;
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
}
</style>
</head>
<body>
<div class="panel">
  <div class="panel-inner">
    <div class="header">
      <img src="https://ts4.mm.bing.net/th?id=OIP.LIualX0FrLhCtRJ2_BivlQHaHP&pid=15.1&o=7&rm=3" alt="Speed icon">
      <div class="header-text">
        <h1>Internet Speed Test</h1>
        <p>Multi‑phase test using real files from GitHub and File.Garden.</p>
      </div>
    </div>

    <div class="main">
      <div class="speed-label">Download speed</div>
      <div id="speedValue" class="speed-value">0.00</div>
      <div class="speed-unit">Mbps</div>

      <div class="status">
        <span class="status-strong" id="statusText">Idle</span>
        <span class="eta" id="etaText">Ready when you are.</span>
      </div>

      <div class="summary" id="summaryBox" style="display:none;">
        <div class="summary-title" id="summaryTitle"></div>
        <div id="summaryBody"></div>
      </div>

      <div class="actions">
        <button id="startBtn">Start test</button>
        <button id="cancelBtn" disabled>Cancel</button>
      </div>

      <div class="footer-note">
        Uses 1MB, 10MB, 25MB, 50MB and 100MB files from both hosts for a more accurate estimate.
      </div>
    </div>
  </div>
</div>

<script>
const FILES = [
  { host: "GitHub", sizeMB: 1,   url: "https://foxurl.github.io/bin/1MB.bin" },
  { host: "File.Garden", sizeMB: 1,   url: "https://file.garden/aIcUbFCOH3ttg6K4/bin/1MB.txt" },
  { host: "GitHub", sizeMB: 10,  url: "https://foxurl.github.io/bin/10MB.bin" },
  { host: "File.Garden", sizeMB: 10,  url: "https://file.garden/aIcUbFCOH3ttg6K4/bin/10MB.txt" },
  { host: "GitHub", sizeMB: 25,  url: "https://foxurl.github.io/bin/25MB.bin" },
  { host: "File.Garden", sizeMB: 25,  url: "https://file.garden/aIcUbFCOH3ttg6K4/bin/25MB.txt" },
  { host: "GitHub", sizeMB: 50,  url: "https://foxurl.github.io/bin/50MB.bin" },
  { host: "File.Garden", sizeMB: 50,  url: "https://file.garden/aIcUbFCOH3ttg6K4/bin/50MB.txt" },
  { host: "GitHub", sizeMB: 100, url: "https://foxurl.github.io/bin/100MB.bin" },
  { host: "File.Garden", sizeMB: 100, url: "https://file.garden/aIcUbFCOH3ttg6K4/bin/100MB.txt" }
];

const VERIFY_GROUPS = [
  [
    { host: "GitHub", sizeMB: 10, url: "https://foxurl.github.io/bin/10MB.bin" },
    { host: "GitHub", sizeMB: 25, url: "https://foxurl.github.io/bin/25MB.bin" }
  ],
  [
    { host: "File.Garden", sizeMB: 10, url: "https://file.garden/aIcUbFCOH3ttg6K4/bin/10MB.txt" },
    { host: "File.Garden", sizeMB: 25, url: "https://file.garden/aIcUbFCOH3ttg6K4/bin/25MB.txt" }
  ]
];

const WEIGHTS = { 1: 0.05, 10: 0.15, 25: 0.25, 50: 0.25, 100: 0.30 };

const speedEl = document.getElementById("speedValue");
const statusEl = document.getElementById("statusText");
const etaEl = document.getElementById("etaText");
const summaryBox = document.getElementById("summaryBox");
const summaryTitle = document.getElementById("summaryTitle");
const summaryBody = document.getElementById("summaryBody");
const startBtn = document.getElementById("startBtn");
const cancelBtn = document.getElementById("cancelBtn");

let abortController = null;

function setSpeedDisplay(mbps, done = false) {
  speedEl.classList.add("updating");
  setTimeout(() => {
    speedEl.textContent = mbps.toFixed(2);
    speedEl.style.color = done ? "var(--success)" : "var(--text)";
    speedEl.classList.remove("updating");
  }, 120);
}

function estimateEta(index, total) {
  const remaining = total - index;
  if (remaining <= 0) return "Almost done.";
  const approxSeconds = remaining * 3; // rough guess
  return `~${approxSeconds}s remaining`;
}

async function downloadFile(entry, signal) {
  const expectedBytes = entry.sizeMB * 1024 * 1024;
  const t0 = performance.now();
  let bytes = 0;

  const resp = await fetch(entry.url, { cache: "no-store", signal });
  if (!resp.ok) throw new Error("HTTP " + resp.status);
  const reader = resp.body.getReader();

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    bytes += value.byteLength;
    if (bytes >= expectedBytes) break;
  }

  const t1 = performance.now();
  const seconds = (t1 - t0) / 1000;
  const bps = (bytes * 8) / seconds;
  return { bps, seconds, bytes };
}

async function runSequential(signal, results) {
  for (let i = 0; i < FILES.length; i++) {
    const f = FILES[i];
    statusEl.textContent = `Testing ${f.host} ${f.sizeMB}MB…`;
    etaEl.textContent = estimateEta(i, FILES.length + VERIFY_GROUPS.length * 2);

    const { bps } = await downloadFile(f, signal);
    const mbps = bps / 1_000_000;
    setSpeedDisplay(mbps);
    if (!results[f.sizeMB]) results[f.sizeMB] = [];
    results[f.sizeMB].push(mbps);
  }
}

async function runVerify(signal, results) {
  for (let g = 0; g < VERIFY_GROUPS.length; g++) {
    const group = VERIFY_GROUPS[g];
    statusEl.textContent = `Verification ${g + 1} of ${VERIFY_GROUPS.length}…`;
    etaEl.textContent = estimateEta(FILES.length + g, FILES.length + VERIFY_GROUPS.length * 2);

    const promises = group.map(f => downloadFile(f, signal));
    const res = await Promise.all(promises);
    res.forEach((r, idx) => {
      const f = group[idx];
      const mbps = r.bps / 1_000_000;
      setSpeedDisplay(mbps);
      if (!results[f.sizeMB]) results[f.sizeMB] = [];
      results[f.sizeMB].push(mbps);
    });
  }
}

function computeFinalMbps(results) {
  let totalWeight = 0;
  let weighted = 0;
  for (const sizeStr in results) {
    const size = Number(sizeStr);
    const arr = results[size];
    if (!arr || !arr.length || !WEIGHTS[size]) continue;
    const avg = arr.reduce((a, b) => a + b, 0) / arr.length;
    const w = WEIGHTS[size];
    weighted += avg * w;
    totalWeight += w;
  }
  if (totalWeight === 0) return 0;
  return weighted / totalWeight;
}

function buildSummary(mbps) {
  let title, body;
  if (mbps >= 200) {
    title = "Your internet is very fast.";
    body = "You can easily stream 4K video, play cloud games, and download large files quickly on multiple devices.";
  } else if (mbps >= 80) {
    title = "Your internet is fast.";
    body = "HD streaming, video calls, and online gaming should feel smooth on most devices.";
  } else if (mbps >= 25) {
    title = "Your internet is okay.";
    body = "HD streaming and video calls will usually work, but multiple devices or 4K video may cause buffering.";
  } else {
    title = "Your internet is slow.";
    body = "Basic browsing and SD streaming will work, but HD video, large downloads, and gaming may struggle.";
  }
  summaryTitle.textContent = title;
  summaryBody.textContent = body;
  summaryBox.style.display = "block";
}

async function runTest() {
  startBtn.disabled = true;
  cancelBtn.disabled = true;
  summaryBox.style.display = "none";
  speedEl.style.color = "var(--text)";
  setSpeedDisplay(0);
  statusEl.textContent = "Starting test…";
  etaEl.textContent = "Estimating time…";

  abortController = new AbortController();
  const signal = abortController.signal;
  cancelBtn.disabled = false;

  const results = {};

  try {
    await runSequential(signal, results);
    await runVerify(signal, results);

    const finalMbps = computeFinalMbps(results);
    setSpeedDisplay(finalMbps, true);
    statusEl.textContent = "Test complete";
    etaEl.textContent = "Done.";
    buildSummary(finalMbps);
  } catch (e) {
    if (signal.aborted) {
      statusEl.textContent = "Test cancelled";
      etaEl.textContent = "You stopped the test.";
    } else {
      statusEl.textContent = "Test failed";
      etaEl.textContent = e.message || "Unknown error.";
    }
  } finally {
    startBtn.disabled = false;
    cancelBtn.disabled = true;
    abortController = null;
  }
}

startBtn.addEventListener("click", () => {
  if (!abortController) runTest();
});

cancelBtn.addEventListener("click", () => {
  if (abortController) abortController.abort();
});
</script>
</body>
</html>
